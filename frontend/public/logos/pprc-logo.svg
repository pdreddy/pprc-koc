<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="PPRC Prosper Premier Racquet Club">
  <defs>
    <linearGradient id="gold1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#f59e0b"/>
      <stop offset="70%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="40%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="50%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="navybg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="320" fill="url(#navybg)"/>

  <!-- ═══ LEFT LAUREL WREATH ═══ -->
  <g fill="url(#gold1)" filter="url(#shadow)">
    <!-- Main stem curve left side -->
    <ellipse cx="94" cy="168" rx="7" ry="18" transform="rotate(-65 94 168)"/>
    <ellipse cx="76" cy="148" rx="7" ry="17" transform="rotate(-55 76 148)"/>
    <ellipse cx="62" cy="126" rx="7" ry="16" transform="rotate(-42 62 126)"/>
    <ellipse cx="55" cy="103" rx="6" ry="15" transform="rotate(-28 55 103)"/>
    <ellipse cx="54" cy="80" rx="6" ry="14" transform="rotate(-14 54 80)"/>
    <ellipse cx="60" cy="59" rx="6" ry="13" transform="rotate(0 60 59)"/>
    <ellipse cx="73" cy="43" rx="6" ry="13" transform="rotate(18 73 43)"/>
    <!-- Bottom leaves -->
    <ellipse cx="108" cy="186" rx="7" ry="16" transform="rotate(-78 108 186)"/>
    <ellipse cx="124" cy="199" rx="6" ry="14" transform="rotate(-88 124 199)"/>
  </g>

  <!-- ═══ RIGHT LAUREL WREATH ═══ -->
  <g fill="url(#gold1)" filter="url(#shadow)">
    <ellipse cx="306" cy="168" rx="7" ry="18" transform="rotate(65 306 168)"/>
    <ellipse cx="324" cy="148" rx="7" ry="17" transform="rotate(55 324 148)"/>
    <ellipse cx="338" cy="126" rx="7" ry="16" transform="rotate(42 338 126)"/>
    <ellipse cx="345" cy="103" rx="6" ry="15" transform="rotate(28 345 103)"/>
    <ellipse cx="346" cy="80" rx="6" ry="14" transform="rotate(14 346 80)"/>
    <ellipse cx="340" cy="59" rx="6" ry="13" transform="rotate(0 340 59)"/>
    <ellipse cx="327" cy="43" rx="6" ry="13" transform="rotate(-18 327 43)"/>
    <ellipse cx="292" cy="186" rx="7" ry="16" transform="rotate(78 292 186)"/>
    <ellipse cx="276" cy="199" rx="6" ry="14" transform="rotate(88 276 199)"/>
  </g>

  <!-- ═══ CROWN ═══ -->
  <g transform="translate(200,14)" filter="url(#shadow)">
    <!-- Crown base band -->
    <rect x="-28" y="22" width="56" height="12" rx="3" fill="url(#gold2)"/>
    <!-- Crown points -->
    <polygon points="-28,22 -22,0 -10,14 0,-6 10,14 22,0 28,22" fill="url(#gold2)"/>
    <!-- Crown gems / dots -->
    <circle cx="-22" cy="0" r="4" fill="#fef3c7"/>
    <circle cx="0" cy="-6" r="5" fill="#fef3c7"/>
    <circle cx="22" cy="0" r="4" fill="#fef3c7"/>
    <!-- Crown band detail -->
    <rect x="-28" y="28" width="56" height="3" rx="1" fill="url(#gold1)" opacity="0.6"/>
  </g>

  <!-- ═══ CROSSED RACKETS ═══ -->
  <g transform="translate(200,88)" filter="url(#shadow)">
    <!-- Racket 1 (left, dark mesh) -->
    <g transform="rotate(-38)">
      <!-- Handle -->
      <rect x="-4" y="26" width="8" height="38" rx="3" fill="#2a2a3a"/>
      <rect x="-3" y="30" width="6" height="8" rx="1" fill="url(#gold1)" opacity="0.6"/>
      <!-- Head outline -->
      <ellipse cx="0" cy="6" rx="22" ry="28" fill="none" stroke="#1a1a2a" stroke-width="5"/>
      <ellipse cx="0" cy="6" rx="22" ry="28" fill="none" stroke="url(#gold1)" stroke-width="1.5"/>
      <!-- Face fill -->
      <ellipse cx="0" cy="6" rx="19" ry="25" fill="#0d1526" opacity="0.9"/>
      <!-- String grid (dark racket) -->
      <line x1="-19" y1="6" x2="19" y2="6" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="-18" y1="-4" x2="18" y2="-4" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="-15" y1="-14" x2="15" y2="-14" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="-19" y1="16" x2="19" y2="16" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="-16" y1="26" x2="16" y2="26" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="0" y1="-19" x2="0" y2="31" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="-9" y1="-20" x2="-9" y2="31" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="9" y1="-20" x2="9" y2="31" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="-17" y1="-16" x2="-17" y2="28" stroke="#2a3a4a" stroke-width="0.8"/>
      <line x1="17" y1="-16" x2="17" y2="28" stroke="#2a3a4a" stroke-width="0.8"/>
    </g>
    <!-- Racket 2 (right, gold) -->
    <g transform="rotate(38)">
      <!-- Handle -->
      <rect x="-4" y="26" width="8" height="38" rx="3" fill="url(#gold2)"/>
      <rect x="-3" y="30" width="6" height="8" rx="1" fill="#92400e" opacity="0.6"/>
      <!-- Head outline -->
      <ellipse cx="0" cy="6" rx="22" ry="28" fill="none" stroke="#92400e" stroke-width="5"/>
      <ellipse cx="0" cy="6" rx="22" ry="28" fill="none" stroke="url(#gold2)" stroke-width="1.5"/>
      <!-- Face fill -->
      <ellipse cx="0" cy="6" rx="19" ry="25" fill="#1a0e00" opacity="0.85"/>
      <!-- String grid (gold racket) -->
      <line x1="-19" y1="6" x2="19" y2="6" stroke="#78350f" stroke-width="0.8"/>
      <line x1="-18" y1="-4" x2="18" y2="-4" stroke="#78350f" stroke-width="0.8"/>
      <line x1="-15" y1="-14" x2="15" y2="-14" stroke="#78350f" stroke-width="0.8"/>
      <line x1="-19" y1="16" x2="19" y2="16" stroke="#78350f" stroke-width="0.8"/>
      <line x1="-16" y1="26" x2="16" y2="26" stroke="#78350f" stroke-width="0.8"/>
      <line x1="0" y1="-19" x2="0" y2="31" stroke="#78350f" stroke-width="0.8"/>
      <line x1="-9" y1="-20" x2="-9" y2="31" stroke="#78350f" stroke-width="0.8"/>
      <line x1="9" y1="-20" x2="9" y2="31" stroke="#78350f" stroke-width="0.8"/>
      <line x1="-17" y1="-16" x2="-17" y2="28" stroke="#78350f" stroke-width="0.8"/>
      <line x1="17" y1="-16" x2="17" y2="28" stroke="#78350f" stroke-width="0.8"/>
    </g>
  </g>

  <!-- ═══ PPRC LETTERS ═══ -->
  <text x="200" y="220" text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="96" font-weight="900"
    fill="url(#gold2)"
    filter="url(#shadow)"
    letter-spacing="4">PPRC</text>

  <!-- ═══ PROSPER PREMIER ═══ -->
  <text x="200" y="252" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="18" font-weight="700"
    fill="url(#silver)"
    letter-spacing="5">PROSPER PREMIER</text>

  <!-- Rule lines + RACQUET CLUB -->
  <line x1="60" y1="272" x2="140" y2="272" stroke="url(#gold1)" stroke-width="1"/>
  <text x="200" y="276" text-anchor="middle"
    font-family="Arial, Helvetica, sans-serif"
    font-size="13" font-weight="600"
    fill="url(#silver)"
    letter-spacing="6">RACQUET CLUB</text>
  <line x1="260" y1="272" x2="340" y2="272" stroke="url(#gold1)" stroke-width="1"/>
</svg>
