<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" role="img" aria-label="PPRC Prosper Premier Racquet Club">
  <defs>
    <linearGradient id="goldG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Laurel wreath left -->
  <g fill="none" stroke="#f59e0b" stroke-width="1.8">
    <ellipse cx="52" cy="100" rx="10" ry="16" transform="rotate(-50 52 100)"/>
    <ellipse cx="42" cy="120" rx="10" ry="16" transform="rotate(-40 42 120)"/>
    <ellipse cx="38" cy="142" rx="10" ry="16" transform="rotate(-25 38 142)"/>
    <ellipse cx="42" cy="163" rx="10" ry="16" transform="rotate(-10 42 163)"/>
    <ellipse cx="54" cy="180" rx="10" ry="16" transform="rotate(10 54 180)"/>
  </g>
  <!-- Laurel wreath right -->
  <g fill="none" stroke="#f59e0b" stroke-width="1.8">
    <ellipse cx="148" cy="100" rx="10" ry="16" transform="rotate(50 148 100)"/>
    <ellipse cx="158" cy="120" rx="10" ry="16" transform="rotate(40 158 120)"/>
    <ellipse cx="162" cy="142" rx="10" ry="16" transform="rotate(25 162 142)"/>
    <ellipse cx="158" cy="163" rx="10" ry="16" transform="rotate(10 158 163)"/>
    <ellipse cx="146" cy="180" rx="10" ry="16" transform="rotate(-10 146 180)"/>
  </g>
  <!-- Bottom laurel bow -->
  <path d="M65 195 Q100 210 135 195" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <!-- Crossed rackets -->
  <g transform="translate(100,118)">
    <!-- Racket 1 (left-leaning) -->
    <ellipse cx="-14" cy="-30" rx="14" ry="20" fill="none" stroke="#f59e0b" stroke-width="2.5" transform="rotate(-30)"/>
    <line x1="-14" y1="-10" x2="14" y2="26" stroke="#f59e0b" stroke-width="3" transform="rotate(-30)" stroke-linecap="round"/>
    <!-- Racket 2 (right-leaning) -->
    <ellipse cx="14" cy="-30" rx="14" ry="20" fill="none" stroke="#f59e0b" stroke-width="2.5" transform="rotate(30)"/>
    <line x1="14" y1="-10" x2="-14" y2="26" stroke="#f59e0b" stroke-width="3" transform="rotate(30)" stroke-linecap="round"/>
    <!-- String lines racket 1 -->
    <line x1="-25" y1="-42" x2="-3" y2="-42" stroke="#f59e0b" stroke-width="0.8" transform="rotate(-30)" opacity="0.6"/>
    <line x1="-24" y1="-36" x2="-2" y2="-36" stroke="#f59e0b" stroke-width="0.8" transform="rotate(-30)" opacity="0.6"/>
    <!-- String lines racket 2 -->
    <line x1="3" y1="-42" x2="25" y2="-42" stroke="#f59e0b" stroke-width="0.8" transform="rotate(30)" opacity="0.6"/>
    <line x1="2" y1="-36" x2="24" y2="-36" stroke="#f59e0b" stroke-width="0.8" transform="rotate(30)" opacity="0.6"/>
  </g>
  <!-- PPRC text -->
  <text x="100" y="158" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="url(#goldG)" letter-spacing="3">PPRC</text>
  <!-- PROSPER PREMIER -->
  <text x="100" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fde68a" letter-spacing="1.5">PROSPER PREMIER</text>
  <!-- RACQUET CLUB -->
  <text x="100" y="188" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fde68a" letter-spacing="1.5">RACQUET CLUB</text>
</svg>
